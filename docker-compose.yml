services:
  postgres:
    image: postgres:16-alpine
    container_name: polymarket-signal-lab-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: polymarket_signal_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polymarket_signal_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: polymarket-signal-lab-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: polymarket-signal-lab-api
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/polymarket_signal_lab
      REDIS_URL: redis://redis:6379
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "npm run migrate && npm run dev"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/tsconfig.json:/app/tsconfig.json

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: polymarket-signal-lab-worker
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/polymarket_signal_lab
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "npm run migrate && npm run worker"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/tsconfig.json:/app/tsconfig.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: polymarket-signal-lab-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8081
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json

volumes:
  postgres_data:
